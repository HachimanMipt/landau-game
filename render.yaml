services:
  - type: web
    name: landau-game
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LANDAU_ENVIRONMENT
        value: production
      - key: LANDAU_SECRET_KEY
        generateValue: true
      - key: LANDAU_ADMIN_PASSWORD
        sync: false
      - key: LANDAU_DATABASE_URL
        value: sqlite:////var/data/app.db
    disk:
      name: landau-data
      mountPath: /var/data
      sizeGB: 1
